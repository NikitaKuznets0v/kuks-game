<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>КУКС — Генеральный прогон</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; }
        .page {
            position: relative;
            width: 100vw;
            height: 100vh;
            background: #1a0505 url('img/bg_final.jpg') center center / contain no-repeat;
        }
        .corner-video {
            position: absolute;
            bottom: 30px;
            left: 30px;
            width: clamp(160px, 25vw, 360px);
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <div class="page">
        <video class="corner-video" autoplay loop muted playsinline>
            <source src="img/final_gif.mp4" type="video/mp4">
        </video>
    </div>
</body>
</html>
