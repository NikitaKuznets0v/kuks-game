<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>КУКС — Генеральный прогон</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; }
        .page {
            position: relative;
            width: 100vw;
            height: 100vh;
            background: #2a0a0a url('img/bg1.jpg') center center / contain no-repeat;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .btn-enter {
            width: clamp(200px, 38vw, 480px);
            cursor: pointer;
            transition: transform 0.15s ease;
        }
        .btn-enter:hover {
            transform: scale(1.04);
        }
    </style>
</head>
<body>
    <div class="page">
        <a href="https://staff.skbkontur.ru/group/36329" target="_blank" rel="noopener">
            <img class="btn-enter" src="img/btn1.png" alt="Вступить в мероприятие">
        </a>
    </div>
</body>
</html>
