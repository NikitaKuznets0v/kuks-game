<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>КУКС — А в активностях?</title>
    <link rel="preload" as="image" href="img/bg1.jpg">
    <link rel="preload" as="image" href="img/btn1.png">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; }
        .page {
            position: relative;
            width: 100vw;
            height: 100vh;
            background: #2a0a0a url('img/bg3.jpg') center center / cover no-repeat;
        }
        #yes-btn {
            position: absolute;
            bottom: 10vh;
            left: calc(50% - 290px);
            width: 260px;
            cursor: pointer;
            transition: transform 0.1s;
        }
        #yes-btn:hover { transform: scale(1.04); }
        #no-btn {
            position: absolute;
            bottom: 10vh;
            left: calc(50% + 30px);
            width: 260px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="page">
        <img id="yes-btn" src="img/btn3_yes.png" alt="Ну да..." onclick="location='final.html'">
        <img id="no-btn" src="img/btn3_no.png" alt="Не хочется">
    </div>
    <script>
        const noBtn = document.getElementById('no-btn');
        noBtn.addEventListener('mouseenter', () => {
            const x = Math.random() * (window.innerWidth - noBtn.offsetWidth);
            const y = Math.random() * (window.innerHeight - noBtn.offsetHeight);
            noBtn.style.left = x + 'px';
            noBtn.style.top = y + 'px';
            noBtn.style.bottom = 'auto';
        });
    </script>
</body>
</html>
